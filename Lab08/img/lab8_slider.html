<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 08 - Slider</title>
    <style>
        * {box-sizing: border-box}
        body {font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f4;}

        /* Khung chứa slider */
        .slideshow-container {
            max-width: 800px;
            position: relative;
            margin: 50px auto 0; /* Cách top 50px, căn giữa */
        }

        /* Ẩn các hình ảnh mặc định */
        .mySlides {
            display: none;
        }

        img {
            vertical-align: middle;
        }

        /* Nút Tới & Lui */
        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -22px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
            background-color: rgba(0,0,0,0.3); /* Thêm nền mờ để dễ nhìn nút */
        }

        .next {
            right: 0;
            border-radius: 3px 0 0 3px;
        }

        .prev:hover, .next:hover {
            background-color: rgba(0,0,0,0.8);
        }

        /* Khu vực các chấm tròn (dots) bên dưới ảnh */
        .dot-container {
            text-align: center;
            padding: 20px 0;
        }

        .dot {
            cursor: pointer;
            height: 15px;
            width: 15px;
            margin: 0 4px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.6s ease;
        }

        .active, .dot:hover {
            background-color: #717171;
        }

        /* Hiệu ứng mờ dần (fade) */
        .fade {
            animation-name: fade;
            animation-duration: 1.5s;
        }

        @keyframes fade {
            from {opacity: .4} 
            to {opacity: 1}
        }
    </style>
</head>
<body>

    <div class="slideshow-container">

        <div class="mySlides fade">
            <img src="slide_1.jpeg" style="width:100%" alt="Slide 1">
        </div>

        <div class="mySlides fade">
            <img src="slide_2.jpg" style="width:100%" alt="Slide 2">
        </div>

        <div class="mySlides fade">
            <img src="slide_3.jpg" style="width:100%" alt="Slide 3">
        </div>

        <div class="mySlides fade">
            <img src="slide_4.jpg" style="width:100%" alt="Slide 4">
        </div>

        <div class="mySlides fade">
            <img src="slide_5.jpg" style="width:100%" alt="Slide 5">
        </div>

        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>

    </div>
<div class="dot-container">
  <span class="dot" onclick="currentSlide(1)"></span> 
  <span class="dot" onclick="currentSlide(2)"></span> 
  <span class="dot" onclick="currentSlide(3)"></span> 
  <span class="dot" onclick="currentSlide(4)"></span> 
  <span class="dot" onclick="currentSlide(5)"></span> 
</div>

<script>
  let slideIndex = 1;
  showSlides(slideIndex);

  function plusSlides(n) {
      showSlides(slideIndex += n);
  }

  function currentSlide(n) {
      showSlides(slideIndex = n);
  }

  function showSlides(n) {
      let i;
      let slides = document.getElementsByClassName("mySlides");
      let dots = document.getElementsByClassName("dot");

      if (n > slides.length) { slideIndex = 1 }    
      if (n < 1) { slideIndex = slides.length }

      for (i = 0; i < slides.length; i++) {
          slides[i].style.display = "none";  
      }
      
      for (i = 0; i < dots.length; i++) {
          dots[i].className = dots[i].className.replace(" active", "");
      }
      
      slides[slideIndex - 1].style.display = "block";  
      dots[slideIndex - 1].className += " active";
  }
  // setInterval(function () {
  //     plusSlides(1);
  // }, 2000);
</script>

</body>
</html>
